{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container-fluid d-flex justify-content-center align-items-center" style="min-height: 80vh; background-color: var(--pc-bg-main);">
    <div class="pc-panel p-4 shadow-lg" style="max-width: 400px; width: 100%; border-radius: 12px;">
        <div class="text-center mb-4">
            <h2 class="pc-text fw-bold">SIG-Aldeias</h2>
            <p class="pc-text-muted small">Acesso Restrito à Plataforma Operacional</p>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="mb-3">
                <label for="email" class="form-label pc-text">Email</label>
                <input type="email" class="form-control pc-input" id="email" placeholder="admin@pc.pt" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label pc-text">Password</label>
                <input type="password" class="form-control pc-input" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn pc-btn-critical w-100 py-2 fw-bold">ENTRAR</button>
            <p id="login-error" class="text-danger mt-2 small text-center d-none">Credenciais inválidas.</p>
        </form>
    </div>
</div>

<script>
async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('login-error');
    const btn = e.target.querySelector('button');

    btn.disabled = true;
    btn.innerText = "A autenticar...";
    errorMsg.classList.add('d-none');

    try {
        const formData = new URLSearchParams();
        formData.append('username', email); // FastAPI OAuth2 espera 'username'
        formData.append('password', password);

        const response = await fetch('/auth/login', { method: 'POST', body: formData });

        if (response.ok) {
            const data = await response.json();
            localStorage.setItem('access_token', data.access_token);
            window.location.href = '/map';
        } else {
            errorMsg.classList.remove('d-none');
            btn.disabled = false;
            btn.innerText = "ENTRAR";
        }
    } catch (err) {
        errorMsg.innerText = "Erro de conexão.";
        errorMsg.classList.remove('d-none');
        btn.disabled = false;
    }
}
</script>
{% endblock %}
