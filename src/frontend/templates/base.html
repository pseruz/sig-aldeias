<!DOCTYPE html>
<html lang="pt-PT" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SIG-Aldeias{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    {% block extra_head %}{% endblock %}
    <style>
        .pc-navbar-custom { background-color: var(--pc-bg-panel, #121824) !important; border-bottom: 1px solid var(--pc-border, rgba(248,249,250,0.12)) !important; position: sticky !important; top: 0; width: 100%; z-index: 1030; min-height: 56px; }
        .pc-nav-link { color: var(--pc-text-muted, #adb5bd) !important; font-weight: 500; transition: all 0.2s ease; font-size: 0.9rem; padding: 0.5rem 0.75rem !important; border-radius: 6px; margin: 0 2px; }
        .pc-nav-link:hover, .pc-nav-link.active { color: var(--pc-text, #f8f9fa) !important; background-color: rgba(255, 107, 0, 0.1); }
        .pc-nav-gateway { color: var(--pc-accent, #ff6b00) !important; border: 1px solid rgba(255, 107, 0, 0.4); background-color: rgba(255, 107, 0, 0.05); font-weight: 600 !important; }
        .pc-brand-icon { color: var(--pc-accent, #ff6b00); }
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
    <nav class="navbar navbar-expand-lg navbar-dark pc-navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/map" style="color: var(--pc-text); letter-spacing: 0.5px;">
                <i class="bi bi-shield-fill-check pc-brand-icon me-2"></i>SIG-Aldeias
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link pc-nav-link pc-nav-gateway" href="/"><i class="bi bi-grid-3x3-gap-fill me-1"></i>Portal Operacional</a></li>
                    <li class="nav-item"><a class="nav-link pc-nav-link {% if request.url.path == '/map' %}active{% endif %}" href="/map"><i class="bi bi-map-fill me-1"></i>Mapa</a></li>
                    <li class="nav-item"><a class="nav-link pc-nav-link {% if request.url.path == '/registo' %}active{% endif %}" href="/registo"><i class="bi bi-geo-alt-fill me-1"></i>Registos</a></li>
                    <li class="nav-item"><a class="nav-link pc-nav-link {% if request.url.path == '/relatorios' %}active{% endif %}" href="/relatorios"><i class="bi bi-file-earmark-bar-graph-fill me-1"></i>Relatórios</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <span class="small d-none d-sm-inline fw-semibold" id="auth-status" style="color: var(--pc-text-muted);"><i class="bi bi-circle-fill text-danger me-1" style="font-size: 8px;"></i>Sem sessão</span>
                    <a href="/login" class="btn btn-sm fw-bold text-uppercase px-3" id="btn-login-nav" style="font-size: 11px; background-color: var(--pc-accent); color: #fff; border: none;">Entrar</a>
                    <button class="btn btn-sm btn-outline-light d-none fw-bold text-uppercase px-3" id="btn-logout-nav" onclick="doLogout()" style="font-size: 11px;">Sair</button>
                </div>
            </div>
        </div>
    </nav>
    <main class="{% block main_class %}container-fluid{% endblock %}">{% block content %}{% endblock %}</main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function getAuthHeaders() { const token = localStorage.getItem('access_token'); return token ? { 'Authorization': 'Bearer ' + token } : {}; }
        window.getAuthHeaders = getAuthHeaders;
        function updateAuthNav() {
            const token = localStorage.getItem('access_token');
            const statusEl = document.getElementById('auth-status');
            const loginBtn = document.getElementById('btn-login-nav');
            const logoutBtn = document.getElementById('btn-logout-nav');
            if (token) {
                if (statusEl) statusEl.innerHTML = '<i class="bi bi-circle-fill text-success me-1" style="font-size:8px;"></i>Sessão ativa';
                if (loginBtn) loginBtn.classList.add('d-none');
                if (logoutBtn) logoutBtn.classList.remove('d-none');
            } else {
                if (statusEl) statusEl.innerHTML = '<i class="bi bi-circle-fill text-danger me-1" style="font-size:8px;"></i>Sem sessão';
                if (loginBtn) loginBtn.classList.remove('d-none');
                if (logoutBtn) logoutBtn.classList.add('d-none');
            }
        }
        function doLogout() { localStorage.removeItem('access_token'); updateAuthNav(); window.location.href = '/login'; }
        document.addEventListener('DOMContentLoaded', updateAuthNav);
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
