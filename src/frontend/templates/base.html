<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SIG-Aldeias{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Leaflet CSS (para mapas) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}bg-light{% endblock %}">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">SIG-Aldeias</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/map">Mapa</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reports">Relatórios</a></li>
                </ul>
                <div class="d-flex">
                    {% if current_user %}
                        <span class="navbar-text me-3">Olá, {{ current_user.name }}</span>
                        <a href="/auth/logout" class="btn btn-outline-light btn-sm">Sair</a>
                    {% else %}
                        <a href="/auth/login" class="btn btn-outline-light btn-sm">Entrar</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Conteúdo principal -->
    <main class="container-fluid {% block main_class %}py-4{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
