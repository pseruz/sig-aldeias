<!DOCTYPE html>
<html lang="pt-PT" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SIG-Aldeias{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Leaflet CSS (para mapas) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <!-- Teu CSS personalizado (CARREGAR ANTES do conteúdo) -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}pc-operational{% endblock %}">
    
    <!-- Navbar (compatível com JWT localStorage) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary" data-pc-navbar>
        <div class="container-fluid">
            <a class="navbar-brand fw-bold pc-text" href="/">
                <i class="bi bi-shield-check me-2"></i>SIG-Aldeias
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link pc-text" href="/map">Mapa</a></li>
                    <li class="nav-item"><a class="nav-link pc-text" href="/registo">Registo</a></li>
                    <li class="nav-item"><a class="nav-link pc-text" href="/relatorios">Relatórios</a></li>
                </ul>
                
                <div class="d-flex align-items-center gap-2" id="auth-nav">
                    <span class="pc-text small d-none d-sm-inline" id="auth-status">Sem sessão</span>
                    <a href="/login" class="btn btn-sm pc-btn-critical" id="btn-login-nav">Entrar</a>
                    <button class="btn btn-sm btn-outline-light d-none" id="btn-logout-nav" onclick="doLogout()">Sair</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Conteúdo principal -->
    <main class="{% block main_class %}container-fluid{% endblock %}" role="main">
        {% block content %}{% endblock %}
    </main>

    <!-- Scripts Base -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Script de Auth Global (para todos os templates) -->
    <script>
        function getAuthHeaders() {
            const token = localStorage.getItem('access_token');
            return token ? { 'Authorization': 'Bearer ' + token } : {};
        }
        
        function updateAuthNav() {
            const token = localStorage.getItem('access_token');
            const statusEl = document.getElementById('auth-status');
            const loginBtn = document.getElementById('btn-login-nav');
            const logoutBtn = document.getElementById('btn-logout-nav');
            
            if (token) {
                if (statusEl) statusEl.textContent = 'Sessão ativa';
                if (loginBtn) loginBtn.classList.add('d-none');
                if (logoutBtn) logoutBtn.classList.remove('d-none');
            } else {
                if (statusEl) statusEl.textContent = 'Sem sessão';
                if (loginBtn) loginBtn.classList.remove('d-none');
                if (logoutBtn) logoutBtn.classList.add('d-none');
            }
        }
        
        function doLogout() {
            localStorage.removeItem('access_token');
            updateAuthNav();
            window.location.href = '/login';
        }
        
        // Atualizar navbar ao carregar
        document.addEventListener('DOMContentLoaded', updateAuthNav);
    </script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
